    .log-err  { color: #f87171; }

    .log-warn { color: #fde68a; }
    .progress { height: 8px; background: #E5E7EB; border-radius: 4px; margin: 10px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: #00A651; border-radius: 4px; transition: width 0.3s; width: 0%; }
    .stat { display: flex; gap: 10px; margin-bottom: 16px; }
    .stat-box { flex: 1; background: #F3F4F6; border-radius: 8px; padding: 10px; text-align: center; }
    .stat-n { font-size: 22px; font-weight: 700; color: #111827; }
    .stat-l { font-size: 11px; color: #6B7280; }
  </style>
</head>

    <div class="stat-box"><div class="stat-n" id="stat-err" style="color:#E24B4A;">0</div><div class="stat-l">Erreurs</div></div>
  </div>

  <button class="btn btn-danger" id="btn-clear" onclick="clearProducts()" style="display:none;">

function log(msg, type) {
  type = type || 'info';
  var el = document.getElementById('log');
  var line = document.createElement('div');
  line.className = 'log-' + type;
  line.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('prog').style.width = pct + '%';
}

var okCount = 0, errCount = 0;

function updateStats() {
  document.getElementById('stat-ok').textContent  = okCount;
  document.getElementById('stat-err').textContent = errCount;
}

// Check auth
onAuthStateChanged(auth, function(user) {
  if (user) {
    log('Connecte comme: ' + user.email, 'ok');
    log('Pret a importer les produits.', 'info');
  } else {
    log('Non connecte ! Retourner sur index.html et se connecter.', 'err');
    document.getElementById('btn-import').disabled = true;
  }
});

window.startImport = async function() {
  var btn = document.getElementById('btn-import');
  btn.disabled = true;
  btn.textContent = 'Import en cours...';
  okCount = 0; errCount = 0;
  log('Debut de l\'import...', 'info');

  for (var i = 0; i < PRODUITS.length; i++) {
    var p = PRODUITS[i];
    try {
      await setDoc(doc(db, 'products', p.id), p);
      okCount++;
      log('OK: ' + p.nom + ' (' + p.id + ')', 'ok');
      setProgress(Math.round(((i+1) / PRODUITS.length) * 100));
      updateStats();
    } catch(e) {
      errCount++;
      log('ERREUR: ' + p.nom + ' — ' + e.message, 'err');
      updateStats();
    }
    // Small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 300));
  }

  log('Import termine ! ' + okCount + ' produits importes.', 'ok');
  btn.textContent = 'Import termine !';
  btn.style.background = '#3B6D11';
  document.getElementById('btn-clear').style.display = 'block';
};

window.clearProducts = async function() {
  if (!confirm('Supprimer tous les produits ?')) return;
  log('Suppression en cours...', 'warn');
  var snap = await getDocs(collection(db, 'products'));
  for (var d of snap.docs) {
    await deleteDoc(d.ref);
    log('Supprime: ' + d.id, 'warn');
  }
  log('Tous les produits supprimes.', 'warn');
};
</script>
