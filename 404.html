<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#00A651">
  <title>DZ Promo — Page introuvable</title>
  <link rel="icon" href="./favicon.ico">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', -apple-system, sans-serif;
      background: #00A651;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    .brand { font-size: 28px; font-weight: 900; color: #00A651; margin-bottom: 8px; }
    .title { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    .desc { font-size: 14px; color: #6B7280; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #00A651;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .btn:hover { background: #007A3D; }
  </style>
  <script>
    // Auto-redirect to main app after 3 seconds
    setTimeout(function() {
      window.location.href = '/dzpromo/index.html';
    }, 3000);
  </script>
</head>
<body>
  <div class="card">
    <div class="emoji">🏷️</div>
    <div class="brand">DZPromo</div>
    <div class="title">Page introuvable</div>
    <div class="desc">
      Cette page n'existe pas ou a été déplacée.<br>
      Redirection automatique dans 3 secondes...
    </div>
    <a href="/dzpromo/index.html" class="btn">Retour à l'accueil</a>
  </div>
</body>
</html>
